<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Characters</title>

    <!-- LINKS -->
    <link rel="stylesheet" href="index.css">
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="index.js"></script>
</head>

<body>
    <header>
        <div id="logoDiv">
            <img id="logo" src="Images/Logo.png" alt="D&D Hall of Characters">
            <h1 class="fantasy-text">Ogni personaggio è da ricordare</h1>
        </div>
    </header>
    <main>
        <div id="mainDiv" class="p-4">
            <div id="divAggiungiBtn" class="mb-3">
                <button class="fantasy-btn btn-add">
                    <span class="btn-icon">✦</span>
                    Aggiungi
                </button>
            </div>
            <div class="row">
                <div id="1" class="character-card col-3 p-2">

                    <div class="corner corner-top-left"></div>
                    <div class="corner corner-top-right"></div>
                    <div class="corner corner-bottom-left"></div>
                    <div class="corner corner-bottom-right"></div>

                    <div class="character-image-wrapper">
                        <img src="Images/PG.jpeg" alt="Character" class="character-image">
                    </div>

                    <div class="character-content">

                        <h2 class="character-name">
                            Armon
                        </h2>

                    </div>

                </div>
            </div>
        </div>
    </main>
</body>

</html>
